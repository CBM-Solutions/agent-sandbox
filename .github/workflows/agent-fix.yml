name: Agent Fix
on:
  issues:
    types: [labeled]

jobs:
  run:
    if: github.event.label.name == 'agent:fix'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools "Bash(gh issue comment:*),Bash(gh pr create:*),Bash(gh pr comment:*),Bash(gh pr view:*),Bash(gh issue view:*),Bash(git:*)"
          prompt: |
            REPO: ${{ github.repository }}
            ISSUE #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}

            Risolvi questa issue in autonomia:
            1. Crea un branch dedicato (es. agent/fix-<numero-issue>).
            2. Applica le modifiche minime necessarie a risolvere il problema.
            3. Apri una Pull Request verso il branch di default con descrizione chiara.
            4. Commenta la issue con il link alla PR.
            Mantieni lo scope ristretto: niente refactor non richiesti.
