name: Bootstrap Agent Labels
on:
  workflow_dispatch:
  push:
    paths:
      - ".github/labels.yml"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: crazy-max/ghaction-github-labeler@v5
        with:
          yaml-file: .github/labels.yml
          skip-delete: true
