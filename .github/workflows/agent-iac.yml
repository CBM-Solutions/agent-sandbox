name: Agent IaC
on:
  pull_request:
    types: [labeled]
  issues:
    types: [labeled]

concurrency:
  group: agent-${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  run:
    if: github.event.label.name == 'agent:iac'
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    uses: CBM-Solutions/.github/.github/workflows/agent-runner.yml@887012fd5c3e1f3b45bcaa8cbb33d1603cf24e56
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      MASTER_BOARD_TOKEN: ${{ secrets.MASTER_BOARD_TOKEN }}
    with:
      model: claude-sonnet-4-6
      fetch_depth: 0
      enable_retry: true
      use_skills: true
      allowed_tools: "Read,Glob,Grep,Bash(gh issue comment:*),Bash(gh issue view:*),Bash(gh pr comment:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*)"
      prompt: |
        /agent-iac

        REPO: ${{ github.repository }}
        EVENTO: ${{ github.event_name }}
        PR #${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}
        ISSUE #${{ github.event.issue.number }} ${{ github.event.issue.title }}

        ${{ github.event.issue.body }}
