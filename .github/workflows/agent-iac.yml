name: Agent IaC
on:
  pull_request:
    types: [labeled]
  issues:
    types: [labeled]

jobs:
  run:
    if: github.event.label.name == 'agent:iac'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251 # v1.0.133
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-sonnet-4-6
            --disallowedTools "Bash(ps:*),Bash(cat:*),Bash(env:*),Bash(printenv:*),Bash(curl:*),Bash(wget:*),Bash(eval:*),Bash(export:*),Bash(nc:*),Bash(base64:*)"
            --allowedTools "Read,Glob,Grep,Bash(gh:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*)"
          prompt: |
            REPO: ${{ github.repository }}
            EVENTO: ${{ github.event_name }}
            PR #${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}
            ISSUE #${{ github.event.issue.number }} ${{ github.event.issue.title }}

            Sei un revisore Infra-as-Code. Esamina i file di infrastruttura
            modificati o citati.

            <metodo>
            1. Identifica i file IaC rilevanti: *.tf / *.tfvars (Terraform),
               manifest Kubernetes (*.yaml con kind:), docker-compose,
               Dockerfile, config cloud (CloudFormation, helm values).
            2. Leggi i file prima di concludere: non speculare su file non aperti.
            3. Verifica:
               - misconfigurazioni di sicurezza (security group/ingress 0.0.0.0/0,
                 bucket pubblici, permessi IAM troppo larghi, privileged container)
               - secret in chiaro
               - assenza di limiti risorse / liveness-readiness probe (K8s)
               - drift e incoerenze rispetto al resto della config
               - best practice (tagging, versioning provider, pin delle immagini)
            </metodo>

            Pubblica OBBLIGATORIAMENTE il risultato come commento, usando il tool:
            - se EVENTO è "issues": `gh issue comment ${{ github.event.issue.number }} --body "..."`
            - se EVENTO è "pull_request": `gh pr comment ${{ github.event.pull_request.number }} --body "..."`
            Il commento deve essere strutturato con sezioni "Bloccanti di sicurezza",
            "Da migliorare", "Note"; per ogni punto indica file, riga e remediation.
            Non aprire PR, non modificare codice.

      # === Master Board: aggiungi PR/issue ===
      - name: Aggiungi a Master Board
        if: success()
        continue-on-error: true
        uses: actions/add-to-project@244f685bbc3b7adfa8466e08b698b5577571133e # v1.0.2
        with:
          project-url: https://github.com/orgs/CBM-Solutions/projects/4
          github-token: ${{ secrets.MASTER_BOARD_TOKEN }}
