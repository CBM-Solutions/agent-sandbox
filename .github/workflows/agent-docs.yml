name: Agent Docs
on:
  issues:
    types: [labeled]

jobs:
  run:
    if: github.event.label.name == 'agent:docs'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools "Bash(gh issue comment:*),Bash(gh pr create:*),Bash(gh pr comment:*),Bash(gh pr view:*),Bash(gh issue view:*),Bash(git:*)"
          prompt: |
            REPO: ${{ github.repository }}
            ISSUE #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}

            Aggiorna la documentazione (README, /docs, commenti di alto livello)
            in base al contesto della issue:
            1. Identifica i file di documentazione rilevanti.
            2. Applica modifiche chiare, senza alterare la logica del codice.
            3. Apri una PR "docs:" verso il branch di default.
            4. Commenta la issue con il link alla PR.
            Non scrivere documentazione speculativa: solo ciò che la issue richiede.
