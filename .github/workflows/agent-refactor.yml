name: Agent Refactor
on:
  issues:
    types: [labeled]

jobs:
  run:
    if: github.event.label.name == 'agent:refactor'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools "Edit,Write,Read,MultiEdit,Glob,Grep,Bash(gh issue comment:*),Bash(gh pr create:*),Bash(gh pr comment:*),Bash(gh pr view:*),Bash(gh issue view:*),Bash(git:*)"
          prompt: |
            REPO: ${{ github.repository }}
            ISSUE #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}

            Esegui un refactoring mirato preservando il comportamento osservabile:
            1. Limita lo scope a quanto descritto nella issue.
            2. Mantieni i test esistenti verdi; aggiungine solo se servono a fissare
               il comportamento prima della modifica.
            3. Nella descrizione della PR includi una sezione "Prima / Dopo"
               con i pattern principali toccati.
            4. Apri una PR "refactor:" e commenta la issue con il link.
            Non introdurre nuove dipendenze o feature.
