name: Agent Security
on:
  pull_request:
    types: [labeled]
  issues:
    types: [labeled]

concurrency:
  group: agent-${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  run:
    if: github.event.label.name == 'agent:security'
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    uses: CBM-Solutions/.github/.github/workflows/agent-runner.yml@40880453a64d22c662f8b8f0d4138a15f619d594
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      MASTER_BOARD_TOKEN: ${{ secrets.MASTER_BOARD_TOKEN }}
    with:
      model: claude-opus-4-8
      fetch_depth: 0
      enable_retry: true
      allowed_tools: "Read,Glob,Grep,Bash(gh issue comment:*),Bash(gh issue view:*),Bash(gh pr comment:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*)"
      prompt: |
        REPO: ${{ github.repository }}
        EVENTO: ${{ github.event_name }}
        PR #${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}
        ISSUE #${{ github.event.issue.number }} ${{ github.event.issue.title }}

        Sei un analista di sicurezza applicativa. Esegui una security review
        diff-aware dell'oggetto etichettato.

        <metodo>
        1. Se è una PR, leggi il diff completo (gh pr diff). Se è una issue,
           leggi il contesto e i file citati.
        2. Non fare affermazioni su codice che non hai aperto: leggi i file
           rilevanti prima di concludere.
        3. Cerca: injection (SQL/command/template), XSS, falle di
           autenticazione/autorizzazione, secret hardcoded, input non
           validato, deserializzazione insicura, path traversal, SSRF,
           dipendenze vulnerabili, gestione errori che espone dati.
        </metodo>

        <reporting>
        Segnala OGNI problema che trovi, anche incerto o a bassa severità.
        Non filtrare per importanza in questa fase. Per ciascun finding indica:
        - severità stimata (Critico / Alto / Medio / Basso)
        - livello di confidence
        - file e riga
        - remediation concreta
        Meglio segnalare un finding che verrà poi scartato che ometterne uno reale.
        </reporting>

        Pubblica OBBLIGATORIAMENTE il risultato come commento, usando il tool:
        - se EVENTO è "issues": `gh issue comment ${{ github.event.issue.number }} --body "..."`
        - se EVENTO è "pull_request": `gh pr comment ${{ github.event.pull_request.number }} --body "..."`
        Il commento deve essere strutturato con sezioni "Critico", "Alto",
        "Medio", "Basso". Se non trovi nulla, dichiaralo esplicitamente.
        Non aprire PR, non modificare codice.
