name: Agent Summary
on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled]

concurrency:
  group: agent-${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  run:
    if: github.event.label.name == 'agent:summary'
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    uses: CBM-Solutions/.github/.github/workflows/agent-runner.yml@1a2b0578966186ca6006eadad7f9c6f0974df54d
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      MASTER_BOARD_TOKEN: ${{ secrets.MASTER_BOARD_TOKEN }}
    with:
      model: claude-haiku-4-5
      fetch_depth: 0
      enable_retry: true
      use_skills: true
      allowed_tools: "Read,Glob,Grep,Bash(gh issue comment:*),Bash(gh pr comment:*),Bash(gh issue view:*),Bash(gh pr view:*),Bash(gh pr diff:*)"
      prompt: |
        /agent-summary

        REPO: ${{ github.repository }}
        EVENTO: ${{ github.event_name }}
        PR #${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}
        ISSUE #${{ github.event.issue.number }} ${{ github.event.issue.title }}

        ${{ github.event.issue.body }}
