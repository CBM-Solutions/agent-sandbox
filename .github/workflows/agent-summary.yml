name: Agent Summary
on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled]

jobs:
  run:
    if: github.event.label.name == 'agent:summary'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251 # v1.0.133
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-haiku-4-5
            --disallowedTools "Bash(ps:*),Bash(cat:*),Bash(env:*),Bash(printenv:*),Bash(curl:*),Bash(wget:*),Bash(eval:*),Bash(export:*),Bash(nc:*),Bash(base64:*)"
            --allowedTools "Read,Glob,Grep,Bash(gh issue comment:*),Bash(gh pr comment:*),Bash(gh issue view:*),Bash(gh pr view:*),Bash(gh pr diff:*)"
          prompt: |
            REPO: ${{ github.repository }}
            EVENTO: ${{ github.event_name }}
            PR #${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}
            ISSUE #${{ github.event.issue.number }} ${{ github.event.issue.title }}

            Produci un TL;DR mobile-friendly (3-5 bullet, max ~80 caratteri per bullet)
            dell'oggetto etichettato, pensato per essere letto al volo da telefono
            prima di decidere come procedere manualmente. Includi:
            - di cosa si tratta in una frase
            - punti chiave / decisioni richieste
            - eventuali rischi o blocchi evidenti

            Output: un singolo commento sull'oggetto etichettato. Nessuna PR,
            nessuna modifica al codice, nessuna analisi profonda.

      # === Master Board: aggiungi PR/issue ===
      - name: Aggiungi a Master Board
        if: success()
        continue-on-error: true
        uses: actions/add-to-project@244f685bbc3b7adfa8466e08b698b5577571133e # v1.0.2
        with:
          project-url: https://github.com/orgs/CBM-Solutions/projects/4
          github-token: ${{ secrets.MASTER_BOARD_TOKEN }}
