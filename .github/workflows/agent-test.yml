name: Agent Test
on:
  issues:
    types: [labeled]

jobs:
  run:
    if: github.event.label.name == 'agent:test'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools "Edit,Write,Read,MultiEdit,Glob,Grep,Bash(gh issue comment:*),Bash(gh pr create:*),Bash(gh pr comment:*),Bash(gh pr view:*),Bash(gh issue view:*),Bash(git:*),Bash(npm:*),Bash(pnpm:*),Bash(yarn:*),Bash(pytest:*),Bash(go test:*),Bash(cargo test:*),Bash(node:*)"
          prompt: |
            REPO: ${{ github.repository }}
            ISSUE #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}

            Genera o sistema i test per l'area indicata nella issue:
            1. Identifica il framework di test del repo (package.json, pyproject, ecc.).
            2. Aggiungi/aggiorna i test mantenendo lo stile esistente.
            3. Verifica che la suite passi in locale prima di aprire la PR.
            4. Apri una PR "test:" con descrizione che include
               "Closes #${{ github.event.issue.number }}" e commenta la issue.
            Non modificare il codice di produzione se non strettamente necessario
            per rendere i test eseguibili.

      # === Master Board: aggiungi issue ===
      - name: Aggiungi issue a Master Board
        id: add-to-project
        if: success()
        continue-on-error: true
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/orgs/CBM-Solutions/projects/4
          github-token: ${{ secrets.MASTER_BOARD_TOKEN }}

      - name: Trova PR aperta dall'agente
        id: find-pr
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM=$(gh pr list --repo "${{ github.repository }}" \
            --author "app/claude" --state open --limit 1 \
            --json number --jq '.[0].number // ""')
          echo "pr_num=$PR_NUM" >> "$GITHUB_OUTPUT"
          if [ -n "$PR_NUM" ]; then echo "Trovata PR #$PR_NUM"; else echo "Nessuna PR da app/claude"; fi

      - name: Setta Status = Test sul Master Board
        if: success() && steps.find-pr.outputs.pr_num != '' && steps.add-to-project.outputs.itemId
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.MASTER_BOARD_TOKEN }}
        run: |
          gh api graphql -f query='
            mutation($project: ID!, $item: ID!, $field: ID!, $value: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $project, itemId: $item,
                fieldId: $field, value: { singleSelectOptionId: $value }
              }) { projectV2Item { id } }
            }' \
            -f project=PVT_kwDOEAw5d84BVmVA \
            -f item="${{ steps.add-to-project.outputs.itemId }}" \
            -f field=PVTSSF_lADOEAw5d84BVmVAzhRBE38 \
            -f value=b11e1636

      - name: Auto-assign reviewer
        if: success() && steps.find-pr.outputs.pr_num != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ steps.find-pr.outputs.pr_num }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: |
          REVIEWERS=("montafra" "K0enjy" "Belletz-28")
          IDX=$((PR_NUM % 3))
          REVIEWER="${REVIEWERS[$IDX]}"
          if [ "$REVIEWER" = "$ISSUE_AUTHOR" ]; then
            REVIEWER="${REVIEWERS[$(((IDX + 1) % 3))]}"
          fi
          echo "Reviewer assegnato: $REVIEWER per PR #$PR_NUM (issue di $ISSUE_AUTHOR)"
          gh pr edit "$PR_NUM" --repo "${{ github.repository }}" --add-reviewer "$REVIEWER"
