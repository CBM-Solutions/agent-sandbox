name: Agent Test
on:
  issues:
    types: [labeled]

concurrency:
  group: agent-${{ github.workflow }}-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  run:
    if: github.event.label.name == 'agent:test'
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    uses: CBM-Solutions/.github/.github/workflows/agent-runner.yml@006b58184c0dca8551231447f347aff740edc0a0
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      MASTER_BOARD_TOKEN: ${{ secrets.MASTER_BOARD_TOKEN }}
    with:
      is_pr_creator: true
      branch_prefix: test
      use_skills: true
      allowed_tools: "Edit,Write,Read,MultiEdit,Glob,Grep,Bash(gh issue comment:*),Bash(gh pr create:*),Bash(gh pr comment:*),Bash(gh pr view:*),Bash(gh issue view:*),Bash(git:*),Bash(npm:*),Bash(pnpm:*),Bash(yarn:*),Bash(pytest:*),Bash(go test:*),Bash(cargo test:*),Bash(node:*)"
      prompt: |
        /agent-test

        REPO: ${{ github.repository }}
        ISSUE #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

        ${{ github.event.issue.body }}
